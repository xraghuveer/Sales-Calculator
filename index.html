<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Calculator + Market Scout</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0066">
<link rel="apple-touch-icon" href="kitty_pwa_icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="kitty_pwa_icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="kitty_pwa_icon.png">

<style>
/* Combined Font Imports */
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700;800&display=swap');

:root {
    --bg-dark: #000000;
    --card-dark: #111111;
    --border-dark: #333333;
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --neon-pink: #ff0066;
    --pink-glow: rgba(255, 0, 102, 0.3);

    --font-header: 'Pacifico', cursive;
    --font-handwritten: 'Indie Flower', cursive;
    --font-variable: 'Inter', sans-serif;
    --font-value: 'JetBrains Mono', monospace;
}

body { 
    font-family: var(--font-variable); 
    background: var(--bg-dark); 
    color: var(--text-main); 
    margin: 0; 
    padding: 0; 
    zoom: 0.9; /* SCALES EVERYTHING DOWN BY 10% */
}
.container { max-width: 480px; margin: auto; padding: 20px; }

h1 {
    font-family: var(--font-header);
    text-align: center;
    font-size: 34px;
    font-weight: 400;
    margin-top: 0;
    margin-bottom: 22px;
    letter-spacing: 1px;
    color: var(--neon-pink);
}

.card { background: var(--card-dark); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border-dark); }

/* 15% Smaller Indie Headings (was 25px, now 21px) */
.indie-heading { font-family: var(--font-handwritten); color: var(--neon-pink); font-size: 21px; letter-spacing: 1px; margin-bottom: 10px; }
.section-title { border-bottom: 1px dashed var(--border-dark); padding-bottom: 5px; }

.btn-group { display: flex; gap: 8px; margin-top: 10px; }
.scout-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--neon-pink); background: transparent; color: var(--neon-pink); font-size: 10px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; transition: 0.3s; }
.scout-btn:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

/* Special Google AI Button styling */
.google-ai-btn { background: linear-gradient(45deg, #ff0066, #9900ff); color: white; border: none; border-radius: 8px; font-weight: 800; }
.google-ai-btn:hover { box-shadow: 0 0 15px #9900ff; }

label.input-label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
input[type="text"], input[type="number"], select { font-family: var(--font-value); width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--border-dark); background: #0a0a0a; color: white; font-size: 14px; box-sizing: border-box; transition: all 0.2s ease-in-out; }
select { font-family: var(--font-variable); appearance: none; cursor: pointer; background-color: #1a1016; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff0066' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 14px center; background-size: 14px; padding-right: 40px; }
textarea { font-family: var(--font-value); width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid var(--border-dark); background: #0a0a0a; color: var(--neon-pink); font-size: 12px; box-sizing: border-box; resize: vertical; cursor: pointer; }
textarea:focus, input[type="text"]:focus, input[type="number"]:focus, select:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 8px var(--pink-glow); }

.toggle-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.toggle-row span { font-size: 13px; font-weight: 600; color: var(--text-main); }
.switch { position: relative; display: inline-block; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-dark); transition: .3s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--neon-pink); }
input:focus + .slider { box-shadow: 0 0 8px var(--pink-glow); }
input:checked + .slider:before { transform: translateX(18px); }

.result { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-dark); }
.data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.data-row span:first-child { font-family: var(--font-variable); font-size: 13px; color: var(--text-muted); }
.data-row span:last-child { font-family: var(--font-value); font-size: 14px; font-weight: 700; }
.data-row.highlight { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--neon-pink); }
.data-row.highlight span:first-child { color: var(--text-main); font-weight: 600; }
.data-row.highlight span:last-child { font-size: 20px; font-weight: 800; color: var(--neon-pink); }

.bad { color: #ff453a; font-family: var(--font-variable); font-weight: 600; }
.good { color: #32d74b; font-family: var(--font-variable); font-weight: 600; }
.category-badge { display: inline-block; background: rgba(255, 0, 102, 0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }

.tips-section h3 { margin-bottom: 12px; margin-top: 0; }
.tips-section ul { padding-left: 20px; margin: 0; font-size: 13px; color: #d1d5db; line-height: 1.6; }
.tips-section li { margin-bottom: 10px; }

/* New Market Research Section */
.market-research-box { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1a050d, #000000); border: 1px solid var(--neon-pink); border-radius: 12px; }
</style>
</head>

<body>

<div class="container">
    <h1>Kitty Calculator 🐾</h1>

    <div class="card">
        <div class="indie-heading" style="margin-top: 0; margin-bottom: 5px;">Product Details</div>
        
        <input type="text" id="productName" placeholder="e.g. Satin Pillowcase with Zipper" oninput="calculate()">

        <div class="indie-heading" style="margin-top: 25px; margin-bottom: 5px;">Sales Mode</div>
        <select id="mode" onchange="calculate()">
            <option value="retail">🛒 Retail Pricing</option>
            <option value="wholesale">📦 Wholesale Pricing (FB)</option>
        </select>

        <div style="margin-top: 25px;">
            <div class="indie-heading section-title">Calculate Cost</div>
            <label class="input-label">Unit Item Price (₱)</label>
            <input type="number" id="cost" min="0" placeholder="0" oninput="calculate()">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label class="input-label">Qty Received</label>
                    <input type="number" id="items" min="1" value="1" oninput="calculate()">
                </div>
                <div style="flex: 2;">
                    <label class="input-label">Supplier Shipping (₱)</label>
                    <input type="number" id="shipping" min="0" placeholder="0" oninput="calculate()">
                </div>
            </div>
        </div>

        <div class="toggle-row" id="meetup-container">
            <span>Include Meetup Fee?</span>
            <label class="switch">
                <input type="checkbox" id="meetupToggle" onchange="calculate()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="output"></div>
    </div>

    <div id="dynamic-tips"></div>
</div>

<script>
const formatPHP = (num) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(num);
const roundUpPrice = (price) => Math.ceil(price / 5) * 5;

function calculate() {
    let rawProductName = document.getElementById("productName").value.trim();
    let productName = rawProductName !== "" ? rawProductName : "this item"; 
    
    let mode = document.getElementById("mode").value;
    let itemPrice = parseFloat(document.getElementById("cost").value) || 0;
    let qty = parseFloat(document.getElementById("items").value) || 1;
    let shipping = parseFloat(document.getElementById("shipping").value) || 0;
    let includeMeetup = document.getElementById("meetupToggle").checked;

    let outputDiv = document.getElementById("output");
    let tipsDiv = document.getElementById("dynamic-tips");
    let meetupContainer = document.getElementById("meetup-container");

    if (mode === "wholesale") { meetupContainer.style.display = "none"; } 
    else { meetupContainer.style.display = "flex"; }

    if (itemPrice === 0) {
        outputDiv.innerHTML = `<div class="result" style="color: #666; text-align: center;">Enter costs to calculate pricing.</div>`;
        tipsDiv.innerHTML = ""; 
        return;
    }

    // BASE CALCULATIONS
    let realCost = itemPrice + (shipping / qty);
    let category = realCost < 80 ? "Small Item (Under ₱80)" : realCost <= 500 ? "Medium Item (₱80 - ₱500)" : "Big Item (₱500+)";

    // ALWAYS CALCULATE RETAIL PRICE (even in wholesale mode, so the AI knows the market ceiling)
    let baseRetailMath = realCost < 80 ? realCost + 10 : realCost <= 500 ? realCost * 1.25 : realCost + 300;
    let standardRetailPrice = roundUpPrice(baseRetailMath);

    let aiPrompt = "";

    if (mode === "retail") {
        let minProfit = realCost < 80 ? 8 : realCost <= 500 ? 40 : 200;
        
        let meetupAmount = 0;
        let meetupLabel = "Disabled";
        if (includeMeetup) {
            if (standardRetailPrice < 200) { meetupAmount = 30; meetupLabel = "+ ₱30"; } 
            else if (standardRetailPrice < 300) { meetupAmount = 20; meetupLabel = "+ ₱20"; } 
            else { meetupAmount = 0; meetupLabel = "FREE 🎉"; }
        }

        let finalSellPrice = standardRetailPrice + meetupAmount;
        let profit = finalSellPrice - realCost;
        let isGoodProfit = profit >= minProfit;
        let profitColor = isGoodProfit ? "#32d74b" : "#ff453a";

        outputDiv.innerHTML = `
            <div class="result">
                <span class="category-badge">${category}</span>
                <div class="data-row"><span>Real Unit Cost:</span><span>${formatPHP(realCost)}</span></div>
                <div class="data-row"><span>Meetup Fee Applied:</span><span style="color: #a1a1aa;">${meetupLabel}</span></div>
                <div class="data-row highlight"><span>Final Sell Price:</span><span>${formatPHP(finalSellPrice)}</span></div>
                <div class="data-row" style="margin-top: 15px;"><span>Net Profit:</span><span style="color: ${profitColor};">${formatPHP(profit)}</span></div>
            </div>
        `;

        let tips = [];
        if (!isGoodProfit) tips.push(`<li><b style="color: #ff453a;">⚠️ Low Margin:</b> Raise price to <span style="color: var(--neon-pink);">${formatPHP(realCost + minProfit)}</span>.</li>`);
        if (standardRetailPrice < 200) tips.push(`<li><b>📦 Sell in Bundles:</b> Sell "2 for <span style="color: var(--neon-pink);">${formatPHP(roundUpPrice((finalSellPrice * 2) * 0.9))}</span>".</li>`);
        tipsDiv.innerHTML = `<div class="card tips-section"><h3 class="indie-heading">💡 Retail Strategy</h3><ul>${tips.join("")}</ul></div>`;

        // FIXED RETAIL PROMPT (Realistic minimum profit factored in)
        aiPrompt = `FB Marketplace Philippines RETAIL analysis for: ${productName}. My Unit Cost: PHP ${realCost.toFixed(2)}. My intended Retail Selling Price: PHP ${finalSellPrice.toFixed(2)}. Please determine the actual market average and output exactly: 1) A table with columns [My Cost | My Retail Price | AI's Est. Avg Market Retail Price | Realistic Min Price (factoring basic overhead/effort)]. 2) A 2-sentence verdict evaluating if my specific retail price is competitive against the actual market. 3) A short, bulleted listing template.`;

    } else {
        let baseWholesale = realCost < 80 ? realCost + 5 : realCost <= 500 ? realCost * 1.15 : realCost + 150;
        let moq5 = baseWholesale;
        let moq10 = baseWholesale * 0.95; 
        let moq20 = baseWholesale * 0.90; 

        let fbText = `📦 WHOLESALE PRICE LIST 📦\n\n✅ 5+ pcs: ${formatPHP(moq5)} each\n✅ 10+ pcs: ${formatPHP(moq10)} each\n✅ 20+ pcs: ${formatPHP(moq20)} each\n\n📩 Send us a message to order!`;

        outputDiv.innerHTML = `
            <div class="result">
                <span class="category-badge">${category}</span>
                <div class="data-row"><span>Real Unit Cost:</span><span>${formatPHP(realCost)}</span></div>
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border-dark);">
                    <div class="indie-heading" style="font-size: 20px; margin-bottom: 12px; color: #32d74b;">Profit Breakdown</div>
                    <div class="data-row"><span>5+ pcs tier:</span><span style="color: #32d74b;">${formatPHP(moq5 - realCost)}</span></div>
                    <div class="data-row"><span>10+ pcs tier:</span><span style="color: #32d74b;">${formatPHP(moq10 - realCost)}</span></div>
                    <div class="data-row"><span>20+ pcs tier:</span><span style="color: #32d74b;">${formatPHP(moq20 - realCost)}</span></div>
                </div>
                <textarea rows="6" readonly onclick="this.select()">${fbText}</textarea>
            </div>
        `;
        
        tipsDiv.innerHTML = `<div class="card tips-section"><h3 class="indie-heading">💡 Wholesale Strategy</h3><ul><li><b>Volume is Key:</b> Wholesale margins are smaller (${formatPHP(moq5 - realCost)} profit per unit at MOQ 5), but you make it up by moving volume.</li><li><b>Shipping:</b> Have the buyer cover courier costs (Lalamove, Grab) directly since bulk items are heavy.</li></ul></div>`;

        // FIXED WHOLESALE PROMPT (Realistic minimum profit factored in)
        aiPrompt = `FB Marketplace Philippines WHOLESALE analysis for: ${productName}. My Unit Cost: PHP ${realCost.toFixed(2)}. My intended Retail Price: PHP ${standardRetailPrice.toFixed(2)}. My intended Wholesale (MOQ 5) Price: PHP ${moq5.toFixed(2)}. Please determine the actual market averages and output exactly: 1) A table with columns [My Cost | My Wholesale Price | AI's Est. Avg Market Wholesale Price | AI's Est. Avg Market Retail Price | Reseller's Potential Profit | Realistic Min Wholesale Price (factoring basic overhead/effort)]. 2) A 2-sentence verdict evaluating if my wholesale price leaves enough margin for resellers to compete against the actual market. 3) A short, bulleted FB listing template targeting resellers.`;
    }

    // --- APPEND THE MARKET RESEARCH BOX TO OUTPUT ---
    let shopeeLink = `https://shopee.ph/search?keyword=${encodeURIComponent(productName)}`;
    let lazadaLink = `https://www.lazada.com.ph/catalog/?q=${encodeURIComponent(productName)}`;
    let googleLink = `https://www.google.com/search?q=${encodeURIComponent(aiPrompt)}`;

    let warningText = rawProductName === "" ? `<div style="color: #ffcc00; font-size: 11px; margin-bottom: 8px; text-align: center;">⚠️ Tip: Enter a 'Product Name' at the top for better AI results!</div>` : "";

    outputDiv.innerHTML += `
        <div class="market-research-box">
            <div class="indie-heading" style="font-size: 20px; text-align: center;">✨ Scout the Market</div>
            ${warningText}
            <div style="font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 12px;">
                Have Google's AI analyze your profit margins and write your FB Marketplace listing:
            </div>
            
            <a href="${googleLink}" target="_blank" class="scout-btn google-ai-btn" style="display: block; padding: 12px; font-size: 12px;">
                🧠 ASK GOOGLE AI FOR STRATEGY
            </a>
            
            <div class="btn-group" style="margin-top: 10px;">
                <a href="${shopeeLink}" target="_blank" class="scout-btn">🛒 SHOPEE</a>
                <a href="${lazadaLink}" target="_blank" class="scout-btn">🛍️ LAZADA</a>
            </div>
        </div>
    `;
}

// Support triggering scout on Enter key (still works, though input calculates automatically now too!)
document.getElementById("productName").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    calculate();
  }
});
</script>

</body>
</html>
