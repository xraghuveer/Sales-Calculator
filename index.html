<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0066">
<link rel="apple-touch-icon" href="kitty_pwa_icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="kitty_pwa_icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="kitty_pwa_icon.png">

<style>
/* Combined Font Imports */
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Pacifico&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700;800&display=swap');

:root {
    --bg-dark: #000000;
    --card-dark: #111111;
    --border-dark: #333333;
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --neon-pink: #ff0066;
    --pink-glow: rgba(255, 0, 102, 0.3);

    /* Font Definitions */
    --font-header: 'Pacifico', cursive;
    --font-handwritten: 'Indie Flower', cursive;
    --font-variable: 'Inter', sans-serif;
    --font-value: 'JetBrains Mono', monospace;
}

body {
    font-family: var(--font-variable);
    background: var(--bg-dark);
    color: var(--text-main);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 480px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-family: var(--font-header);
    text-align: center;
    font-size: 34px; 
    font-weight: 400;
    margin-bottom: 22px;
    letter-spacing: 1px;
    color: var(--neon-pink);
}

.card {
    background: var(--card-dark);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border-dark);
}

.indie-heading {
    font-family: var(--font-handwritten);
    color: var(--neon-pink);
    font-size: 25px; 
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.section-title {
    border-bottom: 1px dashed var(--border-dark);
    padding-bottom: 5px;
}

label.input-label {
    font-size: 12px; 
    font-weight: 600;
    color: var(--text-muted);
    display: block;
    margin-top: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input[type="number"], select {
    font-family: var(--font-value); 
    width: 100%;
    padding: 10px; 
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid var(--border-dark);
    background: #0a0a0a;
    color: white;
    font-size: 14px; 
    box-sizing: border-box;
    transition: all 0.2s ease-in-out;
}

select {
    font-family: var(--font-variable);
    appearance: none;
    cursor: pointer;
    background-color: #1a1016; 
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff0066' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 14px;
    padding-right: 40px; 
}

textarea {
    font-family: var(--font-value);
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid var(--border-dark);
    background: #0a0a0a;
    color: var(--neon-pink);
    font-size: 12px; 
    box-sizing: border-box;
    resize: vertical;
    cursor: pointer;
}

textarea:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--neon-pink);
    box-shadow: 0 0 8px var(--pink-glow);
}

.toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
}

.toggle-row span {
    font-size: 13px; 
    font-weight: 600;
    color: var(--text-main);
}

.switch {
    position: relative;
    display: inline-block;
    width: 40px; 
    height: 22px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--border-dark);
    transition: .3s;
    border-radius: 24px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: var(--neon-pink);
}

input:focus + .slider {
    box-shadow: 0 0 8px var(--pink-glow);
}

input:checked + .slider:before {
    transform: translateX(18px);
}

.result {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-dark);
}

.data-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.data-row span:first-child {
    font-family: var(--font-variable);
    font-size: 13px; 
    color: var(--text-muted);
}

.data-row span:last-child {
    font-family: var(--font-value);
    font-size: 14px; 
    font-weight: 700;
}

.data-row.highlight {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px dashed var(--neon-pink);
}

.data-row.highlight span:first-child {
    color: var(--text-main);
    font-weight: 600;
}

.data-row.highlight span:last-child {
    font-size: 20px; 
    font-weight: 800;
    color: var(--neon-pink);
}

.bad { color: #ff453a; font-family: var(--font-variable); font-weight: 600; }
.good { color: #32d74b; font-family: var(--font-variable); font-weight: 600; }

.category-badge {
    display: inline-block;
    background: rgba(255, 0, 102, 0.1);
    color: var(--neon-pink);
    border: 1px solid var(--neon-pink);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px; 
    font-weight: 600;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tips-section h3 {
    margin-bottom: 12px;
    margin-top: 0;
}

.tips-section ul {
    padding-left: 20px;
    margin: 0;
    font-size: 13px; 
    color: #d1d5db;
    line-height: 1.6;
}

.tips-section li {
    margin-bottom: 10px;
}

.tips-section b {
    color: var(--text-main);
}
</style>
</head>

<body>

<div class="container">
    <h1>Kitty Calculator 🐾</h1>

    <div class="card">
        <div class="indie-heading" style="margin-top: 0; margin-bottom: 5px;">Sales Mode</div>
        <select id="mode" onchange="calculate()">
            <option value="retail">🛒 Retail Pricing</option>
            <option value="wholesale">📦 Wholesale Pricing (Facebook)</option>
        </select>

        <div style="margin-top: 25px;">
            <div class="indie-heading section-title">Calculate Cost</div>
            
            <label class="input-label">Unit Item Price (₱)</label>
            <input type="number" id="cost" min="0" placeholder="0" oninput="calculate()">

            <label class="input-label">Quantity Received</label>
            <input type="number" id="items" min="1" value="1" oninput="calculate()">

            <label class="input-label">Total Supplier Shipping (₱)</label>
            <input type="number" id="shipping" min="0" placeholder="0" oninput="calculate()">
        </div>

        <div class="toggle-row" id="meetup-container">
            <span>Include Meetup Fee?</span>
            <label class="switch">
                <input type="checkbox" id="meetupToggle" onchange="calculate()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="output"></div>
    </div>

    <div id="dynamic-tips"></div>
</div>

<script>
const formatPHP = (num) => {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(num);
};

const roundUpPrice = (price) => {
    return Math.ceil(price / 5) * 5;
};

function calculate() {
    let mode = document.getElementById("mode").value;
    let itemPrice = parseFloat(document.getElementById("cost").value) || 0;
    let qty = parseFloat(document.getElementById("items").value) || 1;
    let shipping = parseFloat(document.getElementById("shipping").value) || 0;
    let includeMeetup = document.getElementById("meetupToggle").checked;

    let outputDiv = document.getElementById("output");
    let tipsDiv = document.getElementById("dynamic-tips");
    let meetupContainer = document.getElementById("meetup-container");

    if (mode === "wholesale") {
        meetupContainer.style.display = "none";
    } else {
        meetupContainer.style.display = "flex";
    }

    if (itemPrice === 0) {
        outputDiv.innerHTML = `<div class="result" style="color: #666; text-align: center;">Enter costs to calculate pricing.</div>`;
        tipsDiv.innerHTML = ""; 
        return;
    }

    let realCost = itemPrice + (shipping / qty);
    
    let category = "";
    if (realCost < 80) {
        category = "Small Item (Under ₱80)";
    } else if (realCost <= 500) {
        category = "Medium Item (₱80 - ₱500)";
    } else {
        category = "Big Item (₱500+)";
    }

    if (mode === "retail") {
        let baseSellPrice = 0;
        let minProfit = 0;

        if (realCost < 80) {
            baseSellPrice = realCost + 10;
            minProfit = 8;
        } else if (realCost <= 500) {
            baseSellPrice = realCost * 1.25;
            minProfit = 40;
        } else {
            baseSellPrice = realCost + 300;
            minProfit = 200;
        }

        let roundedBase = roundUpPrice(baseSellPrice);
        let meetupAmount = 0;
        let meetupLabel = "Disabled";

        if (includeMeetup) {
            if (roundedBase < 200) {
                meetupAmount = 30;
                meetupLabel = "+ ₱30";
            } else if (roundedBase < 300) {
                meetupAmount = 20;
                meetupLabel = "+ ₱20";
            } else {
                meetupAmount = 0;
                meetupLabel = "FREE 🎉";
            }
        }

        let finalSellPrice = roundedBase + meetupAmount;
        let profit = finalSellPrice - realCost;

        let isGoodProfit = profit >= minProfit;
        let statusHTML = isGoodProfit 
            ? `<span class="good">Good Profit</span>` 
            : `<span class="bad">BAD PROFIT (Below ₱${minProfit})</span>`;

        let profitColor = isGoodProfit ? "#32d74b" : "#ff453a";

        outputDiv.innerHTML = `
            <div class="result">
                <span class="category-badge">${category}</span>
                <div class="data-row">
                    <span>Real Unit Cost:</span>
                    <span>${formatPHP(realCost)}</span>
                </div>
                <div class="data-row">
                    <span>Meetup Fee Applied:</span>
                    <span style="color: #a1a1aa;">${meetupLabel}</span>
                </div>
                <div class="data-row highlight">
                    <span>Final Sell Price:</span>
                    <span>${formatPHP(finalSellPrice)}</span>
                </div>
                <div class="data-row" style="margin-top: 15px;">
                    <span>Net Profit:</span>
                    <span style="color: ${profitColor};">${formatPHP(profit)}</span>
                </div>
                <div style="text-align: right; margin-top: 5px; font-size: 13px;">
                    ${statusHTML}
                </div>
            </div>
        `;

        // Tips remain the same logic
        let tips = [];
        if (!isGoodProfit) tips.push(`<li><b style="color: #ff453a;">⚠️ Low Margin:</b> Raising price to <b>${formatPHP(realCost + minProfit)}</b> is recommended.</li>`);
        if (roundedBase < 200) tips.push(`<li><b>📦 Bundle Hack:</b> Sell "2 for ${formatPHP(roundUpPrice(roundedBase * 1.8))}" to offset travel effort.</li>`);
        
        tipsDiv.innerHTML = `<div class="card tips-section"><h3 class="indie-heading">💡 Retail Strategy</h3><ul>${tips.join("")}</ul></div>`;

    } else {
        // Wholesale logic
        let baseWholesale = realCost < 80 ? realCost + 5 : realCost <= 500 ? realCost * 1.15 : realCost + 150;
        let moq5 = baseWholesale;
        let fbText = `📦 WHOLESALE PRICE LIST 📦\n\n✅ 5+ pcs: ${formatPHP(moq5)} each\n📩 Message to order!`;

        outputDiv.innerHTML = `
            <div class="result">
                <span class="category-badge">${category}</span>
                <div class="data-row"><span>Real Unit Cost:</span><span>${formatPHP(realCost)}</span></div>
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border-dark);">
                    <div class="indie-heading" style="font-size: 20px; margin-bottom: 12px; color: #32d74b;">Profit Breakdown</div>
                    <div class="data-row"><span>Wholesale Profit:</span><span style="color: #32d74b;">${formatPHP(moq5 - realCost)}</span></div>
                </div>
                <textarea rows="5" readonly onclick="this.select()">${fbText}</textarea>
            </div>
        `;
    }
}
calculate();
</script>
</body>
</html>
