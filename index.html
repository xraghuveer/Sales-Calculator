<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

:root {
    --bg-dark: #000000;
    --card-dark: #111111;
    --border-dark: #333333;
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --neon-pink: #ff0066;
    --pink-glow: rgba(255, 0, 102, 0.3);
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 480px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
}

.card {
    background: var(--card-dark);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border-dark);
}

label.input-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    display: block;
    margin-top: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input[type="number"] {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid var(--border-dark);
    background: #0a0a0a;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s ease-in-out;
}

input[type="number"]:focus {
    outline: none;
    border-color: var(--neon-pink);
    box-shadow: 0 0 8px var(--pink-glow);
}

/* Custom Toggle Switch Styles */
.toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
}

.toggle-row span {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
}

.switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--border-dark);
    transition: .3s;
    border-radius: 24px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: var(--neon-pink);
}

input:focus + .slider {
    box-shadow: 0 0 8px var(--pink-glow);
}

input:checked + .slider:before {
    transform: translateX(20px);
}

/* Results Styles */
.result {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-dark);
}

.data-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 15px;
}

.data-row.highlight {
    font-size: 20px;
    font-weight: 800;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px dashed var(--neon-pink);
}

.data-row.highlight span:last-child {
    color: var(--neon-pink);
}

.bad { color: #ff453a; font-weight: 600; }
.good { color: #32d74b; font-weight: 600; }

.category-badge {
    display: inline-block;
    background: rgba(255, 0, 102, 0.1);
    color: var(--neon-pink);
    border: 1px solid var(--neon-pink);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* Tips Section */
.tips-section h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: var(--neon-pink);
}

.tips-section ul {
    padding-left: 20px;
    margin: 0;
    font-size: 14px;
    color: #d1d5db;
    line-height: 1.6;
}

.tips-section li {
    margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kitty Calculator 🐾</h1>

    <div class="card">
        <label class="input-label">Item Cost (₱)</label>
        <input type="number" id="cost" min="0" placeholder="0" oninput="calculate()">

        <label class="input-label">Supplier Shipping (Total ₱)</label>
        <input type="number" id="shipping" min="0" placeholder="0" oninput="calculate()">

        <label class="input-label">Total Items Received</label>
        <input type="number" id="items" min="1" value="1" oninput="calculate()">

        <div class="toggle-row">
            <span>Include Meetup Fee?</span>
            <label class="switch">
                <input type="checkbox" id="meetupToggle" checked onchange="calculate()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="output">
            </div>
    </div>

    <div id="dynamic-tips"></div>

</div>

<script>
const formatPHP = (num) => {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(num);
};

const roundUpPrice = (price) => {
    return Math.ceil(price / 5) * 5;
};

function calculate() {
    let cost = parseFloat(document.getElementById("cost").value) || 0;
    let shipping = parseFloat(document.getElementById("shipping").value) || 0;
    let items = parseFloat(document.getElementById("items").value) || 1;
    let includeMeetup = document.getElementById("meetupToggle").checked;

    let outputDiv = document.getElementById("output");
    let tipsDiv = document.getElementById("dynamic-tips");

    if (cost === 0) {
        outputDiv.innerHTML = `<div class="result" style="color: #666; text-align: center;">Enter costs to calculate pricing.</div>`;
        tipsDiv.innerHTML = ""; // Hide tips when empty
        return;
    }

    let realCost = cost + (shipping / items);
    
    let category = "";
    let baseSellPrice = 0;
    let minProfit = 0;

    // Apply Cost Brackets & Multipliers
    if (realCost < 80) {
        category = "Small Item (Under ₱80)";
        baseSellPrice = realCost * 1.5;
        minProfit = 8;
    } else if (realCost <= 500) {
        category = "Medium Item (₱80 - ₱500)";
        baseSellPrice = realCost * 1.5;
        minProfit = 40;
    } else {
        category = "Big Item (₱500+)";
        baseSellPrice = realCost * 1.6;
        minProfit = 200;
    }

    let finalSellPrice = roundUpPrice(baseSellPrice);
    let profit = finalSellPrice - realCost;

    // Calculate Meetup Fee based on Order Size & Toggle
    let meetupText = "";
    if (!includeMeetup) {
        meetupText = "Disabled (₱0)";
    } else {
        if (finalSellPrice < 200) {
            meetupText = "+ ₱30 Meetup Fee";
        } else if (finalSellPrice < 300) {
            meetupText = "+ ₱20 Meetup Fee";
        } else {
            meetupText = "FREE Meetup! 🎉";
        }
    }

    let isGoodProfit = profit >= minProfit;
    let statusHTML = isGoodProfit 
        ? `<span class="good">Good Profit</span>` 
        : `<span class="bad">BAD PROFIT (Below ₱${minProfit})</span>`;

    outputDiv.innerHTML = `
        <div class="result">
            <span class="category-badge">${category}</span>
            
            <div class="data-row">
                <span>Real Unit Cost:</span>
                <span>${formatPHP(realCost)}</span>
            </div>
            
            <div class="data-row">
                <span>Est. Meetup Fee:</span>
                <span style="color: #a1a1aa;">${meetupText}</span>
            </div>

            <div class="data-row highlight">
                <span>Final Sell Price:</span>
                <span>${formatPHP(finalSellPrice)}</span>
            </div>

            <div class="data-row" style="margin-top: 15px;">
                <span>Net Profit:</span>
                <span>${formatPHP(profit)}</span>
            </div>
            
            <div style="text-align: right; margin-top: 5px; font-size: 14px;">
                ${statusHTML}
            </div>
        </div>
    `;

    // --- DYNAMIC TIPS ENGINE ---
    let tips = [];

    if (!isGoodProfit) {
        tips.push(`<li><b style="color: #ff453a;">⚠️ Increase Price or Bundle:</b> Your profit is below the ₱${minProfit} minimum. Either raise the price to <b>${formatPHP(realCost + minProfit)}</b> or set a minimum order quantity to avoid wasting time.</li>`);
    }

    if (finalSellPrice < 200) {
        // Suggest a bundle price by taking final price x 2 and subtracting a tiny bit to make it enticing
        let bundlePrice = roundUpPrice((finalSellPrice * 2) * 0.9); 
        tips.push(`<li><b>📦 Sell in Bundles:</b> To push volume on this cheap item, offer a bundle! Try selling "2 for ${formatPHP(bundlePrice)}".</li>`);
        tips.push(`<li><b>🚫 Separate Shipping:</b> Remember, never absorb shipping costs on cheap items. Rely on the meetup fee or charge it directly.</li>`);
    } else if (finalSellPrice >= 200 && finalSellPrice < 300) {
        let differenceToFree = 300 - finalSellPrice;
        tips.push(`<li><b>🎯 The "Free Meetup" Trick:</b> The price is ${formatPHP(finalSellPrice)}. Tell buyers if they add just <b>${formatPHP(differenceToFree)}</b> more to their order, their meetup is FREE!</li>`);
    } else {
        tips.push(`<li><b>⭐ High Value Item:</b> This order automatically qualifies for a free meetup. Emphasize this perk to seal the deal!</li>`);
    }

    // Render the tips card
    tipsDiv.innerHTML = `
        <div class="card tips-section">
            <h3>💡 Strategy for this Item</h3>
            <ul>
                ${tips.join("")}
            </ul>
        </div>
    `;
}

// Init
calculate();
</script>

</body>
</html>
