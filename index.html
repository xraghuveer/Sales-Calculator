<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Calculator + Market Scout</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0066">
<link rel="apple-touch-icon" href="kitty_pwa_icon.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Indie+Flower&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
    --bg-dark: #000000;
    --card-dark: #111111;
    --border-dark: #333333;
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --neon-pink: #ff0066;
    --pink-glow: rgba(255, 0, 102, 0.3);
    --font-header: 'Pacifico', cursive;
    --font-handwritten: 'Indie Flower', cursive;
    --font-value: 'JetBrains Mono', monospace;
}

body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
.container { max-width: 480px; margin: auto; padding: 20px; }
h1 { font-family: var(--font-header); text-align: center; font-size: 34px; color: var(--neon-pink); margin-bottom: 20px; }
.card { background: var(--card-dark); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border-dark); }
.indie-heading { font-family: var(--font-handwritten); color: var(--neon-pink); font-size: 24px; margin-bottom: 10px; }

/* AI Helper Box */
#ai-helper {
    background: linear-gradient(145deg, #1a050d, #000000);
    border: 1px solid var(--neon-pink);
    box-shadow: 0 0 10px var(--pink-glow);
    display: none;
    margin-bottom: 15px;
}

label.input-label { font-size: 11px; font-weight: 600; color: var(--text-muted); display: block; margin-top: 15px; text-transform: uppercase; }
input, select { font-family: var(--font-value); width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid var(--border-dark); background: #0a0a0a; color: white; box-sizing: border-box; }
input:focus { outline: none; border-color: var(--neon-pink); box-shadow: 0 0 8px var(--pink-glow); }

/* Comparison Buttons */
.btn-group { display: flex; gap: 10px; margin-top: 12px; }
.scout-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--neon-pink);
    background: transparent;
    color: var(--neon-pink);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: 0.3s;
}
.scout-btn:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

.toggle-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; font-size: 13px; }
.switch { position: relative; display: inline-block; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-dark); transition: .3s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--neon-pink); }
input:checked + .slider:before { transform: translateX(18px); }

.result { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-dark); }
.data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
.highlight { border-top: 1px dashed var(--neon-pink); padding-top: 15px; color: var(--neon-pink); font-weight: 800; font-size: 18px; }
.category-badge { display: inline-block; background: rgba(255,0,102,0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); padding: 4px 8px; border-radius: 6px; font-size: 10px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="container">
    <h1>Kitty Calculator 🐾</h1>

    <div id="ai-helper" class="card">
        <div class="indie-heading" style="font-size: 18px;">✨ Kitty's Smart Scout</div>
        <div id="ai-content" style="font-size: 13px; line-height: 1.4;"></div>
        
        <div class="btn-group">
            <a id="shopeeBtn" target="_blank" class="scout-btn">🛒 SHOPEE</a>
            <a id="lazadaBtn" target="_blank" class="scout-btn">🛍️ LAZADA</a>
        </div>
    </div>

    <div class="card">
        <label class="input-label">Product Name</label>
        <input type="text" id="productName" placeholder="e.g. Pillowcase" oninput="calculate()">

        <label class="input-label">Sales Mode</label>
        <select id="mode" onchange="calculate()">
            <option value="retail">🛒 Retail Pricing</option>
            <option value="wholesale">📦 Wholesale Pricing</option>
        </select>

        <label class="input-label">Unit Cost (₱)</label>
        <input type="number" id="cost" placeholder="0" oninput="calculate()">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label class="input-label">Qty</label>
                <input type="number" id="items" value="1" oninput="calculate()">
            </div>
            <div style="flex: 2;">
                <label class="input-label">Shipping (₱)</label>
                <input type="number" id="shipping" placeholder="0" oninput="calculate()">
            </div>
        </div>

        <div class="toggle-row">
            <span>Include Meetup Fee?</span>
            <label class="switch">
                <input type="checkbox" id="meetupToggle" onchange="calculate()">
                <span class="slider"></span>
            </label>
        </div>

        <div id="output"></div>
    </div>
</div>

<script>
const marketData = {
    "pillowcase": { min: 45, max: 150, tip: "Check Shopee for 'Satin' vs 'Cotton' price gaps." },
    "shirt": { min: 150, max: 450, tip: "Market is saturated. Focus on unique designs!" },
    "keychain": { min: 25, max: 85, tip: "Popular at ₱55. Add a cute backing card!" },
    "tote bag": { min: 80, max: 250, tip: "Canvas prices vary. Check Lazada for bulk suppliers." },
    "mug": { min: 90, max: 200, tip: "Personalized mugs usually retail for ₱150+." },
    "sticker": { min: 10, max: 45, tip: "Waterproof vinyl is priced higher than paper." },
    "lip tint": { min: 45, max: 180, tip: "Brand name tints sell for ₱120+. Locals at ₱50-70." },
    "phone case": { min: 65, max: 250, tip: "Clear cases are cheap. Shockproof/Printed are ₱150+." },
    "plushie": { min: 120, max: 600, tip: "Check sizes! Small 10cm plushies are around ₱150." }
};

const formatPHP = (num) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(num);

function calculate() {
    let nameInput = document.getElementById("productName").value;
    let productName = nameInput.toLowerCase();
    let itemPrice = parseFloat(document.getElementById("cost").value) || 0;
    let qty = parseFloat(document.getElementById("items").value) || 1;
    let shipping = parseFloat(document.getElementById("shipping").value) || 0;
    let includeMeetup = document.getElementById("meetupToggle").checked;
    
    let aiBox = document.getElementById("ai-helper");
    let aiContent = document.getElementById("ai-content");
    let outputDiv = document.getElementById("output");

    // 1. AI & Scout Button Logic
    if (nameInput.length > 2) {
        aiBox.style.display = "block";
        let matchedKey = Object.keys(marketData).find(key => productName.includes(key));
        
        // Update Search Links
        document.getElementById("shopeeBtn").href = `https://shopee.ph/search?keyword=${encodeURIComponent(nameInput)}`;
        document.getElementById("lazadaBtn").href = `https://www.lazada.com.ph/tag/${encodeURIComponent(nameInput)}`;

        if (matchedKey) {
            let data = marketData[matchedKey];
            aiContent.innerHTML = `Selling <b>${matchedKey}</b>? Market: <b>${formatPHP(data.min)} - ${formatPHP(data.max)}</b>.<br><span style="color:var(--text-muted)">${data.tip}</span>`;
        } else {
            aiContent.innerHTML = `No data for "<b>${nameInput}</b>", but you can check live prices below:`;
        }
    } else {
        aiBox.style.display = "none";
    }

    if (itemPrice === 0) {
        outputDiv.innerHTML = `<p style="text-align:center; color:#666; margin-top:20px;">Enter unit cost to see magic!</p>`;
        return;
    }

    // 2. Math Logic (Retail)
    let realCost = itemPrice + (shipping / qty);
    let baseSell = realCost < 80 ? realCost + 15 : realCost * 1.35;
    let roundedBase = Math.ceil(baseSell / 5) * 5;
    
    let meetupAmount = 0;
    let meetupLabel = "Disabled";
    if (includeMeetup) {
        if (roundedBase < 200) { meetupAmount = 30; meetupLabel = "+ ₱30"; }
        else if (roundedBase < 300) { meetupAmount = 20; meetupLabel = "+ ₱20"; }
        else { meetupAmount = 0; meetupLabel = "FREE 🎉"; }
    }

    let finalSell = roundedBase + meetupAmount;
    let profit = finalSell - realCost;

    outputDiv.innerHTML = `
        <div class="result">
            <span class="category-badge">Final Breakdown</span>
            <div class="data-row"><span>Real Unit Cost:</span><span>${formatPHP(realCost)}</span></div>
            <div class="data-row"><span>Meetup Fee:</span><span style="color:#a1a1aa">${meetupLabel}</span></div>
            <div class="data-row highlight"><span>Final Price:</span><span>${formatPHP(finalSell)}</span></div>
            <div class="data-row" style="margin-top:10px;">
                <span>Total Profit:</span>
                <b style="color:#32d74b">${formatPHP(profit)}</b>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
