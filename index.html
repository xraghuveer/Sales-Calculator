<div class="market-research-box">
    <div class="indie-heading" style="font-size: 16px; text-align: center;">🚀 Ultimate Research</div>
    
    <a href="https://lens.google.com/search?p" target="_blank" class="scout-btn image-search-btn">
        📸 1. SNAP & FIND NAME
    </a>

    <div class="toggle-row" style="margin: 10px 0; padding: 10px 0; border-top: 1px solid #333;">
        <span style="font-size: 11px; color:#aaa;">Spy on Shopee/Lazada?</span>
        <label class="switch">
            <input type="checkbox" id="platformToggle" onchange="window.usePlatformAI = this.checked; calculate()">
            <span class="slider"></span>
        </label>
    </div>

    <button onclick="copyPrompt()" class="scout-btn google-ai-btn" id="copyBtn">
        📋 2. COPY AI STRATEGY
    </button>
    
    <p id="copyStatus" style="font-size: 10px; color: #32d74b; text-align: center; margin-top: 5px; display: none;">Prompt Copied! Paste it into Google/Gemini ✨</p>
</div>

<script>
// Add this function to your existing <script> section
function copyPrompt() {
    let activePrompt = window.usePlatformAI ? window.platformPrompt : window.generalPrompt;
    
    // Create a temporary element to copy text
    const el = document.createElement('textarea');
    el.value = activePrompt;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);

    // Visual feedback
    const btn = document.getElementById('copyBtn');
    const status = document.getElementById('copyStatus');
    btn.innerText = "✅ READY TO PASTE";
    status.style.display = "block";
    
    setTimeout(() => {
        btn.innerText = "📋 2. COPY AI STRATEGY";
        status.style.display = "none";
    }, 3000);
}
</script>
